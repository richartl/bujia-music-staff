services:
  staff-platform:
    image: node:20-alpine
    container_name: staff-platform
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://host.docker.internal:3000}
      VITE_APP_NAME: ${VITE_APP_NAME:-Staff Platform}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - staff_platform_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    stdin_open: true
    tty: true

volumes:
  staff_platform_node_modules:
